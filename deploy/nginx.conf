# /etc/nginx/sites-available/barberhub
# Substitua "seudominio.com.br" pelo domínio real antes de ativar.

server {
    listen 80;
    server_name seudominio.com.br www.seudominio.com.br;

    # Redireciona todo HTTP para HTTPS após instalar o certificado SSL
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name seudominio.com.br www.seudominio.com.br;

    # ── SSL (preenchido automaticamente pelo Certbot) ─────────────────────────
    ssl_certificate     /etc/letsencrypt/live/seudominio.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/seudominio.com.br/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Segurança ─────────────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           SAMEORIGIN                            always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    # ── Limites ───────────────────────────────────────────────────────────────
    client_max_body_size 6M;      # ligeiramente acima do MAX_CONTENT_LENGTH do Flask

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/barberhub-access.log;
    error_log  /var/log/nginx/barberhub-error.log warn;

    # ── Arquivos estáticos (Nginx serve diretamente, sem passar pelo Gunicorn) ─
    location /static/ {
        alias /var/www/barberhub/app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Uploads com controle de cache menor (conteúdo muda com frequência)
    location /static/uploads/ {
        alias /var/www/barberhub/app/static/uploads/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Proxy para Gunicorn ───────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        # Desativa buffer para streaming de respostas longas (relatórios)
        proxy_buffering off;
    }

    # ── Favicon / robots ──────────────────────────────────────────────────────
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
}
